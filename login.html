<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول - لوحة GIS غزة</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #1e3a8a;
      --secondary: #3b82f6;
      --accent: #10b981;
      --white: rgba(255, 255, 255, 0.7);
      --glass-bg: rgba(255, 255, 255, 0.1);
      --glass-border: rgba(255, 255, 255, 0.2);
    }

    * {
      box-sizing: border-box;
      font-family: 'Tajawal', sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      overflow: hidden;
      padding: 20px;
    }

    /* Modern Mesh Background */
    .mesh-background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #0f172a;
      background-image: 
        radial-gradient(at 0% 0%, hsla(217,100%,13%,1) 0, transparent 50%), 
        radial-gradient(at 50% 0%, hsla(217,91%,21%,1) 0, transparent 50%), 
        radial-gradient(at 100% 0%, hsla(217,100%,13%,1) 0, transparent 50%), 
        radial-gradient(at 0% 100%, hsla(217,100%,13%,1) 0, transparent 50%), 
        radial-gradient(at 50% 100%, hsla(217,91%,21%,1) 0, transparent 50%), 
        radial-gradient(at 100% 100%, hsla(217,100%,13%,1) 0, transparent 50%);
      z-index: -1;
    }

    .mesh-glow {
      position: absolute;
      width: 40%;
      height: 40%;
      background: radial-gradient(circle, rgba(59, 130, 246, 0.3) 0%, transparent 70%);
      filter: blur(80px);
      animation: float 20s infinite alternate;
      z-index: -1;
    }

    @keyframes float {
      0% { transform: translate(-20%, -20%) scale(1); }
      100% { transform: translate(40%, 40%) scale(1.2); }
    }

    .login-wrapper {
      position: relative;
      width: 100%;
      max-width: 450px;
      perspective: 1000px;
    }

    .login-container {
      position: relative;
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 40px;
      padding: 50px 40px;
      box-shadow: 
        0 25px 50px -12px rgba(0, 0, 0, 0.5),
        inset 0 1px 1px rgba(255, 255, 255, 0.1);
      text-align: center;
      animation: slideIn 1s cubic-bezier(0.16, 1, 0.3, 1);
      overflow: hidden;
    }

    /* Lighting effect on top */
    .login-container::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.4), transparent);
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(30px) rotateX(-5deg); }
      to { opacity: 1; transform: translateY(0) rotateX(0); }
    }

    .logos {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 35px;
    }

    .logos img {
      height: 60px;
      filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.2));
      transition: transform 0.3s ease;
    }

    .logos img:hover {
      transform: scale(1.1) rotate(3deg);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 26px;
      color: #fff;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    p {
      margin: 0 0 40px;
      color: rgba(255, 255, 255, 0.6);
      font-size: 16px;
    }

    .input-group {
      margin-bottom: 25px;
      text-align: right;
      position: relative;
    }

    .input-group label {
      display: block;
      margin-bottom: 10px;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.8);
      font-weight: 500;
      padding-right: 5px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper i {
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255, 255, 255, 0.4);
      transition: color 0.3s ease;
      font-size: 18px;
    }

    .input-group input {
      width: 100%;
      padding: 18px 55px 18px 20px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      font-size: 16px;
      color: #fff;
      outline: none;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .input-group input:focus {
      background: rgba(255, 255, 255, 0.1);
      border-color: var(--secondary);
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2);
    }

    .input-group input:focus + i {
      color: var(--secondary);
    }

    .login-btn {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
      color: white;
      border: none;
      border-radius: 20px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.4s ease;
      box-shadow: 0 10px 25px -5px rgba(37, 99, 235, 0.4);
      margin-top: 15px;
      position: relative;
      overflow: hidden;
    }

    .login-btn::after {
      content: "";
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
      transform: rotate(45deg);
      transition: 0.5s;
    }

    .login-btn:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 20px 35px -10px rgba(37, 99, 235, 0.6);
    }

    .login-btn:hover::after {
      left: 100%;
    }

    .login-btn:active {
      transform: translateY(0);
    }

    #error-msg {
      color: #fb7185;
      margin-top: 20px;
      font-size: 14px;
      font-weight: 600;
      opacity: 0;
      transform: translateY(-10px);
      transition: all 0.4s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    #error-msg.show {
      opacity: 1;
      transform: translateY(0);
    }

    .footer {
      margin-top: 40px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.4);
      text-align: center;
      width: 100%;
      position: absolute;
      bottom: 30px;
      left: 0;
      letter-spacing: 0.5px;
    }

    /* Glass sparkles */
    .sparkle {
        position: absolute;
        background: #fff;
        border-radius: 50%;
        opacity: 0.3;
        pointer-events: none;
        animation: float-sparkle 10s infinite linear;
    }
    
    @keyframes float-sparkle {
        0% { transform: translateY(0) rotate(0deg); opacity: 0; }
        50% { opacity: 0.3; }
        100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
    }
  </style>
</head>

<body>
  <div class="mesh-background">
      <div class="mesh-glow" style="top: 10%; left: 10%;"></div>
      <div class="mesh-glow" style="bottom: 10%; right: 10%; animation-delay: -5s;"></div>
  </div>

  <div class="login-wrapper">
    <div class="login-container">
      <div class="logos">
        <img src="logo2.png" alt="Logo 1">
        <img src="logo3.png" alt="Logo 2">
      </div>
      <h1>لوحة الحصر الميداني المتقدمة</h1>
      <p>نظام المعلومات الجغرافية المتكامل - غزة</p>

      <form id="login-form">
        <div class="input-group">
          <label>اسم المستخدم</label>
          <div class="input-wrapper">
            <input type="text" id="username" placeholder="مثال: ibrahim" required autocomplete="username">
            <i class="fa-solid fa-user"></i>
          </div>
        </div>
        <div class="input-group">
          <label>كلمة المرور</label>
          <div class="input-wrapper">
            <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
            <i class="fa-solid fa-lock"></i>
          </div>
        </div>
        <button type="submit" class="login-btn" id="submit-btn">
          <span>تسجيل الدخول</span>
        </button>
        <div id="error-msg">
            <i class="fa-solid fa-circle-exclamation"></i>
            خطأ في اسم المستخدم أو كلمة المرور
        </div>
      </form>
    </div>
  </div>

  <div class="footer">
    © جميع الحقوق محفوظة لدى الهيئة العربية الدولية للإعمار في فلسطين
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js';
    import { getFirestore } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js';
    import { firebaseConfig } from './firebase-config.js';
    import { initializeFirebase, authenticateUser } from './firebase-operations.js';

    const app = initializeApp(firebaseConfig);
    window.db = getFirestore(app);
    window.firebaseInit = initializeFirebase(app);

    const loginForm = document.getElementById('login-form');
    const errorMsg = document.getElementById('error-msg');
    const submitBtn = document.getElementById('submit-btn');

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const emailInput = document.getElementById('username').value.trim();
      const passwordInput = document.getElementById('password').value;

      // Loading state visualization
      const originalText = submitBtn.innerHTML;
      submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> جاري التحقق...';
      submitBtn.disabled = true;

      try {
        const result = await authenticateUser(emailInput, passwordInput);

        if (result.success) {
          localStorage.setItem('currentUser', JSON.stringify(result.user));
          window.location.href = 'index.html';
        } else {
          submitBtn.innerHTML = originalText;
          submitBtn.disabled = false;
          errorMsg.innerHTML = `<i class="fa-solid fa-circle-exclamation"></i> ${result.message}`;
          errorMsg.classList.add('show');
          setTimeout(() => {
            errorMsg.classList.remove('show');
          }, 3000);
        }
      } catch (err) {
          console.error("Login Error:", err);
          submitBtn.innerHTML = originalText;
          submitBtn.disabled = false;
          errorMsg.innerHTML = `<i class="fa-solid fa-triangle-exclamation"></i> خطأ في الاتصال بقاعدة البيانات`;
          errorMsg.classList.add('show');
      }
    });

    // Sparkles effect
    for(let i=0; i<15; i++) {
        let sparkle = document.createElement('div');
        sparkle.className = 'sparkle';
        sparkle.style.left = Math.random() * 100 + '%';
        sparkle.style.top = Math.random() * 100 + '%';
        let size = Math.random() * 4 + 2 + 'px';
        sparkle.style.width = size;
        sparkle.style.height = size;
        sparkle.style.animationDelay = Math.random() * 10 + 's';
        document.body.appendChild(sparkle);
    }
  </script>
</body>

</html>
